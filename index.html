<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sylla‑BOT</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- REQUIRED WRAPPER FOR CENTERED CARD LAYOUT -->
  <div id="chat-container">

    <header id="header">
      <h1>sylla‑BOT</h1>

      <div id="toggles">
        <label class="toggle">
          <input type="checkbox" id="darkModeToggle">
          <span>Dark Mode</span>
        </label>

        <label class="toggle">
          <input type="checkbox" id="voiceToggle">
          <span>Voice</span>
        </label>
      </div>
    </header>

    <main id="chat"></main>

    <div id="typingIndicator" class="typing hidden">
      sylla‑BOT is typing…
    </div>

    <div id="input-area">
      <input id="userInput" type="text" placeholder="Ask me anything…" />
      <button id="sendBtn">Send</button>
    </div>

  </div> <!-- END chat-container -->

  <script src="script.js"></script>
</body>
</html>
