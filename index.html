<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>sylla-BOT – ILCS 1001 Syllabus Q&A</title>

<style>
body {
    background: #0b0c10;
    color: #c5c6c7;
    font-family: Arial, sans-serif;
    padding: 30px;
}
#box {
    background: #1f2833;
    padding: 20px;
    border-radius: 10px;
    max-width: 900px;
    margin: auto;
    border: 1px solid #0b1c2c;
}
textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    background: #0b1c2c;
    color: white;
    border: 1px solid #3a506b;
}
#buttonRow {
    display: flex;
    justify-content: flex-start;
    margin-top: 10px;
}
button {
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #66fcf1;
    color: #0b0c10;
    font-weight: bold;
    cursor: pointer;
    margin-right: 10px;
}
#chat {
    margin-top: 20px;
    max-height: 420px;
    overflow-y: auto;
}
.message {
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 80%;
    white-space: pre-wrap;
}
.user {
    background: #116466;
    margin-left: auto;
    color: white;
}
.bot {
    background: #1f2833;
    border: 1px solid #0b1c2c;
}
</style>
</head>

<body>
<div id="box">
    <h2>sylla-BOT – ILCS 1001 Syllabus Q&A</h2>

    <textarea id="q" rows="3" placeholder="Ask a question about the syllabus…"></textarea>

    <div id="buttonRow">
        <button onclick="handleQuestion()">Ask</button>
        <button onclick="clearChat()">Clear Chat</button>
    </div>

    <div id="chat"></div>
</div>

<script>
/* ⭐⭐⭐ PASTE YOUR SYLLABUS HERE ⭐⭐⭐ */
const rawSyllabus = `
PASTE YOUR SYLLABUS HERE
`;

/* ⭐⭐⭐ DO NOT EDIT BELOW THIS LINE ⭐⭐⭐ */

async function askLLM(question) {
    const response = await fetch("/.netlify/functions/syllabus-bot", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            question: question,
            syllabus: rawSyllabus
        })
    });

    const data = await response.json();
    return data.answer;
}

function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "message " + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function handleQuestion() {
    const q = document.getElementById("q").value.trim();
    if (!q) return;

    addMessage(q, "user");
    document.getElementById("q").value = "";

    addMessage("Thinking…", "bot");

    const answers = document.getElementsByClassName("bot");
    const thinkingBubble = answers[answers.length - 1];

    try {
        const ans = await askLLM(q);
        thinkingBubble.textContent = ans;
    } catch (e) {
        thinkingBubble.textContent = "Error contacting server.";
    }
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
}
</script>

</body>
</html>
